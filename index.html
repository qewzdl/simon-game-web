<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Game</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Simon Game</h1>
    </header>
    <main>
        <div class="box-container">
            <button class="box" id="box1"></button>
            <button class="box" id="box2"></button>
            <button class="box" id="box3"></button>
            <button class="box" id="box4"></button>
        </div>
        <p class="text-to-start">Press any button to start</p>
    </main>
    <footer>
        <p id="level-label">Level 1</p>
        <p id="best-score-label">Best Score: 0</p>
    </footer>

    <a class="github-link" href="https://github.com/qewzdl/simon-game-web">
        <img src="./assets/images/github-logo.png" alt="GitHub logo">
        <div>GitHub Project</div>
    </a>

    <script src="./game.js"></script>
</body>
</html>
